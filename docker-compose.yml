version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: poker_db
    environment:
      - POSTGRES_USER=poker_admin
      - POSTGRES_PASSWORD=secure_password
      - POSTGRES_DB=poker_treasury_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
